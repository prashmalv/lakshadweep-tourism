name: Deploy Lakshadweep to Azure VM

# Triggers on push to main or manual dispatch.
# SSH into the VM, pulls latest, builds, zero-downtime reload PM2.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-azure-vm-lakshadweep
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: SSH and deploy
        env:
          SSH_KEY:  ${{ secrets.AZURE_VM_SSH_KEY }}
          SSH_HOST: ${{ secrets.AZURE_VM_HOST }}
          SSH_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" bash -s <<'REMOTE'
          set -e
          cd /home/egovai/lakshadweep

          # First-time bootstrap: if no .git yet, clone; otherwise pull
          if [ ! -d .git ]; then
            cd /home/egovai
            [ -d lakshadweep ] && mv lakshadweep lakshadweep.old
            git clone --depth 1 https://github.com/prashmalv/lakshadweep-tourism.git lakshadweep
            [ -d lakshadweep.old/node_modules ] && mv lakshadweep.old/node_modules lakshadweep/ || true
            rm -rf lakshadweep.old
            cd lakshadweep
          else
            git fetch --depth 1 origin main
            git reset --hard origin/main
          fi

          echo "→ npm install"
          npm install --silent

          echo "→ build"
          npm run build

          echo "→ pm2 reload"
          source /etc/environment
          export ANTHROPIC_API_KEY
          pm2 reload lakshadweep --update-env || pm2 start ecosystem.config.cjs --update-env
          pm2 save --force >/dev/null

          echo "→ health check"
          sleep 2
          curl -fsS http://localhost:3000/api/health
          echo
          echo "✓ Deploy complete"
          REMOTE
